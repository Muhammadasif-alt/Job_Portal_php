<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 260 64" width="260" height="64" role="img" aria-label="Jobs in USA">
  <defs>
    <linearGradient id="jiu-accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff5722"/>
      <stop offset="100%" stop-color="#5e2bff"/>
    </linearGradient>
    <linearGradient id="jiu-gold" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffd54f"/>
      <stop offset="100%" stop-color="#ff7043"/>
    </linearGradient>
  </defs>

  <!-- Icon mark: brand-black rounded square with briefcase + star -->
  <g>
    <rect x="2" y="4" width="56" height="56" rx="14" fill="#0a0a0a"/>
    <!-- Subtle orange glow corner -->
    <circle cx="56" cy="8" r="14" fill="url(#jiu-accent)" opacity=".55"/>
    <!-- Briefcase handle -->
    <path d="M22 23 v-3 a4 4 0 0 1 4-4 h8 a4 4 0 0 1 4 4 v3"
          fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round"/>
    <!-- Briefcase body -->
    <rect x="14" y="23" width="32" height="22" rx="4" fill="#fff"/>
    <!-- Center latch -->
    <rect x="27" y="32" width="6" height="3" rx="1.5" fill="#0a0a0a"/>
    <!-- Orange divider line -->
    <rect x="14" y="30" width="32" height="2" fill="url(#jiu-gold)" opacity=".9"/>
    <!-- Star badge (USA hint) -->
    <path d="M46 14 l1.4 2.85 3.15.46 -2.28 2.22 .54 3.13 -2.81-1.48 -2.81 1.48 .54-3.13 -2.28-2.22 3.15-.46 z"
          fill="url(#jiu-gold)"/>
  </g>

  <!-- Wordmark -->
  <g font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-weight="800" letter-spacing="-.4">
    <text x="72" y="32" font-size="20" fill="#0a0a0a">Jobs in</text>
    <text x="72" y="54" font-size="20" fill="url(#jiu-accent)">USA</text>
    <!-- Tiny accent dot after USA -->
    <circle cx="124" cy="48" r="3" fill="#ff5722"/>
  </g>
</svg>
